version: v2

target:
  runtime: docker_exec
  container: train8-docker
  entry_script: ""
  entry_args: ""
  entry_cwd: ""
  command: ""
  program: python3
  script: analyzer/workload/vllm_distributed_smoke.py
  args: ""
  env:
    VLLM_SMOKE_MODEL: /data/models/models--Qwen--Qwen3-8B/snapshots/b968826d9c46dd6066d109eabc6255188de91218
    VLLM_SMOKE_TP: 2
    VLLM_SMOKE_PP: 2
    VLLM_SMOKE_MAX_MODEL_LEN: 1024
    VLLM_SMOKE_MAX_TOKENS: 32
    VLLM_SMOKE_BATCH_SIZE: 1
    VLLM_SMOKE_ROUNDS: 1
    VLLM_SMOKE_TEMPERATURE: 0.0
    VLLM_SMOKE_DTYPE: bfloat16
    VLLM_SMOKE_TRUST_REMOTE_CODE: off
    VLLM_SMOKE_PROMPT: "Explain the purpose of msprof in one sentence."
  visible_devices: "0,1,2,3,4,5,6,7"
  keep_remote: false

msprof:
  timeout_seconds: 1800
  ascendcl: on
  runtime_api: on
  task_time: l1
  hccl: on
  aicpu: off
  ai_core: off
  model_execution: off
  aic_mode: sample-based
  aic_freq: 50
  aic_metrics: PipeUtilization
  type: db
  sys_hardware_mem: off
  sys_hardware_mem_freq: 20
  l2: off
  ge_api: off
  task_memory: off

profiler:
  out_root: ../out
  run_tag: auto
  process_after_collect: true
  raw_input_dir: ""
  process_out_dir: ""
  topn_streams: 50
  topn_edges: 100
  topn_loops: 100
  topn_kernels: 50
  legacy_script: ""
  reuse_legacy_out: ""
